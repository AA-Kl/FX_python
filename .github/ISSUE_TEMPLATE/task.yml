name: Task
description: Assign work to coding agent
title: "[TASK]: "
labels: ["agent-task"]

body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context

  - type: textarea
    id: steps
    attributes:
      label: Suggested Steps

  - type: textarea
    id: done
    attributes:
      label: Definition of Done
    validations:
      required: true
